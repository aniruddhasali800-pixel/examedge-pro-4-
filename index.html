    /* Custom Scrollbar for professional feel */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;

    ::-webkit-scrollbar-thumb {
      background: #888; 
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {

    }
    /* Prevent text selection for content protection simulation */
    .protected-content {
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
